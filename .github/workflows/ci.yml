name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ha-dashboard has no QA Cloud Run tier (see organize-me's
  # docs/adr/ha-dashboard-no-qa-environment.md) - there is nothing to deploy to on a PR. This job's
  # throwaway Postgres service container (not Supabase) stands in for what SUPABASE_QA_URL would
  # otherwise provide, giving pytest's db_session-dependent fixtures and the Alembic migration
  # history something real to run against pre-merge.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ha_dashboard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ha_dashboard_ci
      # Only a pydantic-settings required-field placeholder - nothing in this job's steps (the
      # migration, the health-check test) ever reads its value. See migrations/env.py /
      # app/core/config.py.
      JWT_SECRET: ci-placeholder-unused
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev --group build

      - name: Build Tailwind CSS
        run: uv run python scripts/build_css.py

      - name: Verify compiled CSS is non-empty and contains the canary utility class
        run: uv run python scripts/verify_css_build.py

      # ha-dashboard has no QA/shared Supabase tier (see organize-me's
      # docs/adr/ha-dashboard-no-qa-environment.md), so unlike doc-library/event-creator's CI,
      # this throwaway Postgres has no host.users table for the Alembic migration below to grant
      # REFERENCES on (0002_grant_host_users_references.py) or for create_host_user() (tests/
      # conftest.py) to insert into. Bootstrapped here as a stand-in for what organize-me's own
      # migrations already provide against the real shared database - see
      # scripts/ci/bootstrap_host_users.sql (shared with deploy.yml's identical smoke-test step).
      - name: Bootstrap host.users (CI-only stand-in for the shared host schema)
        run: psql "$DATABASE_URL" -f scripts/ci/bootstrap_host_users.sql

      - name: Run Alembic migrations (throwaway CI Postgres, ha_dashboard schema)
        run: uv run alembic upgrade head

      # alembic upgrade head can exit 0 while having actually done nothing, if a connection is
      # left mid-transaction when Alembic hands off to its own transaction management (see
      # migrations/env.py's comment) - /health never touches the DB, so nothing else in this job
      # would otherwise notice. Assert the version table actually has the expected row.
      - name: Verify the migration actually persisted
        run: |
          uv run python - <<'PYEOF'
          import asyncio
          import os

          import asyncpg

          from app.db.url import to_asyncpg_url


          async def main() -> None:
              url = to_asyncpg_url(os.environ["DATABASE_URL"]).replace("+asyncpg", "")
              conn = await asyncpg.connect(url)
              try:
                  row = await conn.fetchrow("SELECT version_num FROM ha_dashboard.alembic_version")
              finally:
                  await conn.close()
              assert row is not None, "ha_dashboard.alembic_version is empty - migration did not persist"
              print(f"Migration persisted at revision: {row['version_num']}")


          asyncio.run(main())
          PYEOF

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests
