name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ha-dashboard has no QA Cloud Run tier (see organize-me's
  # docs/adr/ha-dashboard-no-qa-environment.md) - there is nothing to deploy to on a PR. This job's
  # throwaway Postgres service container (not Supabase) stands in for what SUPABASE_QA_URL would
  # otherwise provide, giving pytest's db_session-dependent fixtures and the Alembic migration
  # history something real to run against pre-merge.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ha_dashboard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ha_dashboard_ci
      # Only a pydantic-settings required-field placeholder - nothing in this job's steps (the
      # migration, the health-check test) ever reads its value. See migrations/env.py /
      # app/core/config.py.
      JWT_SECRET: ci-placeholder-unused
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Alembic migrations (throwaway CI Postgres, ha_dashboard schema)
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests
